  body { font-family: Arial, sans-serif; background: #f9f9f6; margin: 0; padding: 24px; }

  svg text { font-family: Arial, sans-serif; }

  .node:hover { opacity: 0.85; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }

  /* Color ramps — light mode */
  .c-teal  rect, .c-teal  circle, .c-teal  ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  .th, .c-teal  .t  { fill: #085041; }
  .c-teal  .ts                { fill: #0F6E56; }
  .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; }

  .c-coral .ts                { fill: #993C1D; }
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t { fill: #3C3489; }
  .c-purple .ts               { fill: #534AB7; }
  .c-blue  rect, .c-blue  circle, .c-blue  ellipse { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue  .th, .c-blue  .t  { fill: #0C447C; }
  .c-blue  .ts                { fill: #185FA5; }
  .c-gray  rect, .c-gray  circle, .c-gray  ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray  .th, .c-gray  .t  { fill: #2C2C2A; }
  .c-gray  .ts                { fill: #5F5E5A; }

    body { background: #1e1e1c; }
    h2 { color: #c2c0b6; }
    p  { color: #9c9a92; }
    .t, .th { fill: #e8e6de; }
    .ts     { fill: #9c9a92; }
    .c-teal  rect, .c-teal  circle { fill: #085041; stroke: #5DCAA5; }
    .c-teal  .th, .c-teal  .t      { fill: #9FE1CB; }
    .c-teal  .ts                   { fill: #5DCAA5; }
    .c-coral rect, .c-coral circle { fill: #712B13; stroke: #F0997B; }
    .c-coral .th, .c-coral .t      { fill: #F5C4B3; }
    .c-coral .ts                   { fill: #F0997B; }
    .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th, .c-purple .t    { fill: #CECBF6; }
    .c-purple .ts                  { fill: #AFA9EC; }
    .c-blue  rect, .c-blue  circle { fill: #0C447C; stroke: #85B7EB; }
    .c-blue  .th, .c-blue  .t      { fill: #B5D4F4; }
    .c-blue  .ts                   { fill: #85B7EB; }
    .c-gray  rect, .c-gray  circle { fill: #2C2C2A; stroke: #888780; }
    .c-gray  .th, .c-gray  .t      { fill: #D3D1C7; }
    .c-gray  .ts                   { fill: #888780; }
  }
</style>
</head>
